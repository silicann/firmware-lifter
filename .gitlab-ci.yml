default:
  image: debian:bookworm-slim

before_script:
  - apt-get update --yes
  - apt-get install --yes pipx
  - PIPX_BIN_DIR=/usr/local/bin PIPX_HOME=/opt/pipx pipx install hatch

stages:
  - build
  - test
  - style

build:
  stage: build
  script:
    - hatch build

test:pytest:
  stage: test
  script:
    - hatch test

style:typing:
  stage: style
  script:
    - hatch run style:typing

style:lint:
  stage: style
  script:
    - hatch fmt --check
