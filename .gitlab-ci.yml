default:
  image: debian:trixie-slim

before_script:
  - apt-get update --yes
  - apt-get install --yes just pipx
  - PIPX_BIN_DIR=/usr/local/bin PIPX_HOME=/opt/pipx pipx install hatch

stages:
  - build
  - test

build:
  stage: build
  script:
    - hatch build

test:pytest:
  stage: test
  script:
    - hatch test

lint:
  stage: test
  script:
    - just lint
